<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Discord Login (PKCE)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: #2e2e48;
      padding: 2.5rem 3rem;
      border-radius: 12px;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      color: #89b4fa;
      margin-bottom: 1.2rem;
    }
    p {
      color: #a6adc8;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    button {
      background: #5865f2;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: background 0.2s;
    }
    button:hover {
      background: #4752c4;
    }
    button svg {
      width: 24px;
      height: 24px;
    }
    #status {
      margin-top: 1.8rem;
      min-height: 1.8em;
      font-weight: 500;
    }
    .loading { color: #f9e2af; }
    .success { color: #a6e3a1; }
    .error   { color: #f38ba8; }
  </style>
</head>
<body>

<div class="container">
  <h1>Test logowania Discord</h1>
  <p>Po zalogowaniu pobierze się plik <code>uzytkownicy.txt</code> z jedną linią danych.</p>

  <button id="loginBtn">
    <svg viewBox="0 0 127.14 96.36" fill="currentColor">
      <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-.09 56.6.06 80.21a113.31 113.31 0 0 0 33.09 16.59 77.06 77.06 0 0 0 6.75-10.27 70.33 70.33 0 0 1-10.81-5.14c.91-.66 1.8-1.34 2.66-2.03a73.6 73.6 0 0 0 62.36 0c.87.69 1.75 1.37 2.66 2.03a70.8 70.8 0 0 1-10.82 5.15 77.5 77.5 0 0 0 6.75 10.27 113.3 113.3 0 0 0 33.08-16.59c.17-23.61-2.71-47.56-14.07-72.14zM42.45 65.69C38.49 65.69 35 62.42 35 58.4s3.49-7.29 7.45-7.29 7.45 3.27 7.45 7.29-3.49 7.29-7.45 7.29zm42.24 0c-3.96 0-7.45-3.27-7.45-7.29s3.49-7.29 7.45-7.29 7.45 3.27 7.45 7.29-3.49 7.29-7.45 7.29z"/>
    </svg>
    Zaloguj się przez Discord
  </button>

  <div id="status"></div>
</div>

<script>
// ──────────────────────────────────────────────────────────────
//  Zmień tylko tę jedną linię!
const CLIENT_ID = "1478856260526018671";
// ──────────────────────────────────────────────────────────────

const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPE = "identify";

const authUrl = new URL("https://discord.com/api/oauth2/authorize");
authUrl.searchParams.set("client_id", CLIENT_ID);
authUrl.searchParams.set("redirect_uri", REDIRECT_URI);
authUrl.searchParams.set("response_type", "code");
authUrl.searchParams.set("scope", SCOPE);

// PKCE
async function generateCodeChallenge() {
  const random = crypto.getRandomValues(new Uint8Array(32));
  const verifier = btoa(String.fromCharCode(...random))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=/g, "");

  const hashed = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(hashed)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=/g, "");

  return { verifier, challenge };
}

document.getElementById("loginBtn").addEventListener("click", async () => {
  const status = document.getElementById("status");
  status.textContent = "Przygotowuję logowanie...";
  status.className = "loading";

  try {
    const { verifier, challenge } = await generateCodeChallenge();

    sessionStorage.setItem("pkce_verifier", verifier);

    const state = crypto.randomUUID();
    sessionStorage.setItem("oauth_state", state);

    authUrl.searchParams.set("state", state);
    authUrl.searchParams.set("code_challenge", challenge);
    authUrl.searchParams.set("code_challenge_method", "S256");

    window.location.href = authUrl.toString();
  } catch (err) {
    status.textContent = "Błąd: " + err.message;
    status.className = "error";
  }
});

window.addEventListener("load", async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");
  const error = params.get("error");

  if (error) {
    document.getElementById("status").textContent = `Błąd Discorda: ${error}`;
    document.getElementById("status").className = "error";
    return;
  }

  if (!code) return;

  const savedState = sessionStorage.getItem("oauth_state");
  if (state !== savedState) {
    document.getElementById("status").textContent = "Błąd: niepasujący state (CSRF?)";
    document.getElementById("status").className = "error";
    return;
  }

  const verifier = sessionStorage.getItem("pkce_verifier");
  if (!verifier) {
    document.getElementById("status").textContent = "Brak verifiera PKCE";
    document.getElementById("status").className = "error";
    return;
  }

  const status = document.getElementById("status");
  status.textContent = "Logowanie... pobieram token...";
  status.className = "loading";

  try {
    // Wymiana code → token
    const tokenBody = new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    });

    const tokenRes = await fetch("https://discord.com/api/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: tokenBody.toString()
    });

    if (!tokenRes.ok) {
      const err = await tokenRes.json();
      throw new Error(err.error_description || "Błąd tokena");
    }

    const { access_token } = await tokenRes.json();

    // Pobranie danych użytkownika
    const userRes = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: `Bearer ${access_token}` }
    });

    if (!userRes.ok) throw new Error("Błąd pobierania użytkownika");

    const user = await userRes.json();

    const username = user.global_name || user.username;
    const disc = user.discriminator === "0" ? "" : "#" + user.discriminator;
    const line = `${new Date().toISOString()} | ${user.id} | ${username}${disc}\n`;

    // Pobranie starej zawartości (jeśli istnieje)
    let oldContent = "";
    try {
      const resp = await fetch("uzytkownicy.txt");
      if (resp.ok) oldContent = await resp.text();
    } catch {}

    const blob = new Blob([oldContent + line], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "uzytkownicy.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    status.innerHTML = `Gotowe!<br>Zarejestrowano: <strong>${username}${disc}</strong>`;
    status.className = "success";

    // Czyszczenie
    sessionStorage.removeItem("pkce_verifier");
    sessionStorage.removeItem("oauth_state");
    history.replaceState({}, "", window.location.pathname);

  } catch (err) {
    status.textContent = "Błąd: " + err.message;
    status.className = "error";
    console.error(err);
  }
});
</script>
</body>
</html>
