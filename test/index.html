<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weryfikacja Discord → Arkusz</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0ff;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #16213e;
      padding: 2.5rem 3rem;
      border-radius: 12px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    h1 { color: #00d4ff; margin-bottom: 1rem; }
    p  { color: #b0c4de; line-height: 1.5; margin-bottom: 1.8rem; }
    button {
      background: #5865f2;
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    button:hover { background: #4752c4; }
    #status {
      margin-top: 1.8rem;
      font-weight: 500;
      min-height: 2em;
    }
    .loading { color: #ffd166; }
    .success { color: #06d6a0; }
    .error   { color: #ef476f; }
    .key-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #0f3460;
      border-radius: 8px;
      word-break: break-all;
      font-family: monospace;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Weryfikacja Discord</h1>
  <p>Zaloguj się kontem Discord, aby zweryfikować się i otrzymać klucz weryfikacyjny.</p>

  <button id="btn">
    <svg width="24" height="24" viewBox="0 0 127 96" fill="currentColor">
      <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-.09 56.6.06 80.21a113.31 113.31 0 0 0 33.09 16.59 77.06 77.06 0 0 0 6.75-10.27 70.33 70.33 0 0 1-10.81-5.14c.91-.66 1.8-1.34 2.66-2.03a73.6 73.6 0 0 0 62.36 0c.87.69 1.75 1.37 2.66 2.03a70.8 70.8 0 0 1-10.82 5.15 77.5 77.5 0 0 0 6.75 10.27 113.3 113.3 0 0 0 33.08-16.59c.17-23.61-2.71-47.56-14.07-72.14zM42.45 65.69C38.49 65.69 35 62.42 35 58.4s3.49-7.29 7.45-7.29 7.45 3.27 7.45 7.29-3.49 7.29-7.45 7.29zm42.24 0c-3.96 0-7.45-3.27-7.45-7.29s3.49-7.29 7.45-7.29 7.45 3.27 7.45 7.29-3.49 7.29-7.45 7.29z"/>
    </svg>
    Zaloguj się przez Discord
  </button>

  <div id="status"></div>
  <div id="key" class="key-box" style="display:none;"></div>
</div>

<script>
// ────────────────────────────────────────────────
// Zmień tylko te dwie linie!
const CLIENT_ID    = "1478856260526018671";
const SCRIPT_URL   = "https://script.google.com/macros/s/TWÓJ_WEB_APP_ID/exec";  // ← wklej swój URL Web App !!!
// ────────────────────────────────────────────────

const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPE = "identify";

const authUrl = new URL("https://discord.com/api/oauth2/authorize");
authUrl.searchParams.set("client_id", CLIENT_ID);
authUrl.searchParams.set("redirect_uri", REDIRECT_URI);
authUrl.searchParams.set("response_type", "code");
authUrl.searchParams.set("scope", SCOPE);

async function generatePKCE() {
  const rand = crypto.getRandomValues(new Uint8Array(32));
  const verifier = btoa(String.fromCharCode(...rand))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
  const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
  return { verifier, challenge };
}

document.getElementById("btn").onclick = async () => {
  const status = document.getElementById("status");
  status.textContent = "Przygotowanie...";
  status.className = "loading";

  try {
    const { verifier, challenge } = await generatePKCE();
    sessionStorage.setItem("pkce_verifier", verifier);

    const state = crypto.randomUUID();
    sessionStorage.setItem("oauth_state", state);

    authUrl.searchParams.set("state", state);
    authUrl.searchParams.set("code_challenge", challenge);
    authUrl.searchParams.set("code_challenge_method", "S256");

    window.location.href = authUrl.toString();
  } catch (err) {
    status.textContent = "Błąd startu: " + err.message;
    status.className = "error";
  }
};

window.addEventListener("load", async () => {
  const params = new URLSearchParams(location.search);
  const code  = params.get("code");
  const state = params.get("state");

  if (!code) return;

  const savedState = sessionStorage.getItem("oauth_state");
  if (state !== savedState) {
    document.getElementById("status").textContent = "Błąd bezpieczeństwa (state mismatch)";
    document.getElementById("status").className = "error";
    return;
  }

  const verifier = sessionStorage.getItem("pkce_verifier");
  if (!verifier) return;

  const status = document.getElementById("status");
  status.textContent = "Weryfikacja...";

  try {
    // 1. Wymiana code → token (PKCE)
    const tokenBody = new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    });

    const tokenRes = await fetch("https://discord.com/api/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: tokenBody
    });

    if (!tokenRes.ok) throw new Error("Błąd uzyskania tokena");

    const { access_token } = await tokenRes.json();

    // 2. Pobranie danych użytkownika
    const userRes = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: `Bearer ${access_token}` }
    });

    if (!userRes.ok) throw new Error("Błąd pobrania danych");

    const user = await userRes.json();

    const username = user.global_name || user.username;
    const disc = user.discriminator === "0" ? "" : "#" + user.discriminator;

    status.textContent = "Zapisywanie do arkusza...";

    // 3. Wysyłamy do Apps Script
    const resp = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "verifyDiscordUser",
        discordId: user.id,
        username: username,
        discriminator: user.discriminator,
        globalName: user.global_name || "",
        avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : ""
      })
    });

    const result = await resp.json();

    if (!result.success) {
      throw new Error(result.error || "Błąd zapisu");
    }

    // 4. Ustawiamy cookie z kluczem weryfikacyjnym
    document.cookie = `verificationKey=${result.key}; path=/; max-age=${60*60*24*90}; SameSite=Lax`; // 90 dni

    status.innerHTML = `Zweryfikowano pomyślnie!<br><strong>${username}${disc}</strong>`;
    status.className = "success";

    document.getElementById("key").innerHTML = `
      Twój klucz weryfikacyjny:<br>
      <strong>${result.key}</strong><br>
      <small>(zapisany też jako cookie „verificationKey”)</small>
    `;
    document.getElementById("key").style.display = "block";

    // Czyszczenie
    sessionStorage.clear();
    history.replaceState({}, "", location.pathname);

  } catch (err) {
    status.textContent = "Błąd: " + err.message;
    status.className = "error";
    console.error(err);
  }
});
</script>
</body>
</html>
